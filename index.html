<!DOCTYPE html>

<head>

<body>

    <div id="converter">
        <textarea id="regexInput" placeholder="Enter regular expression..."></textarea>
        <button id="convertButton">Convert</button>
        <div id="output"></div>
    </div>
    <script>
        function regexToNFA(regex) {

            // Placeholder function
            return regex; // Return the regex as is for now
        }

        function convert() {
            const regex = document.getElementById('regexInput').value;
            const nfa = regexToNFA(regex);
